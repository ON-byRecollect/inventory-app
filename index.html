<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>在庫管理Pro</title>
    <style>
        :root {
            --bg-body: #f4f4f7;
            --btn-out: #ff9500; /* オレンジ */
            --btn-in: #34c759;  /* 緑 */
            /* 項目背景色 */
            --item-red: #ffcccc;      /* ゆうパケット系 */
            --item-yellow: #fff9c4;   /* 宅急便コンパクト */
            --item-black: #3a3a3c;    /* Black */
            --item-starlight: #f5f5f0;/* Starlight */
            --item-white: #ffffff;    /* ケーブル */
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-body);
            margin: 0; padding: 10px;
            user-select: none;
        }

        h2 { font-size: 0.9rem; color: #666; margin: 15px 0 5px 5px; }

        .item-row {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            margin-bottom: 4px;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* 左側：名前と残数 */
        .name-area {
            flex: 1;
            display: flex;
            align-items: baseline;
            gap: 8px;
            min-width: 0;
        }
        .name { font-size: 0.85rem; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .stock-num { font-size: 1.1rem; font-weight: 900; color: #007aff; }

        /* 右側：操作系 */
        .controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-sq {
            width: 44px; height: 44px;
            border: none; border-radius: 6px;
            color: white; font-weight: bold; font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .btn-out { background-color: var(--btn-out); }
        .btn-in { background-color: var(--btn-in); }
        .btn-sq:active { opacity: 0.7; transform: scale(0.95); }

        select {
            height: 44px; width: 55px;
            border: 1px solid #ccc; border-radius: 6px;
            font-size: 1rem; text-align: center;
            background: white;
            -webkit-appearance: none; /* iPhone標準デザインの調整 */
            padding-left: 10px;
        }

        /* 項目別背景カラー（文字色も調整） */
        .row-red { background-color: var(--item-red); color: #800; }
        .row-yellow { background-color: var(--item-yellow); color: #850; }
        .row-black { background-color: var(--item-black); color: #fff; }
        .row-black .stock-num { color: #5ac8fa; } /* 黒背景で見えやすく */
        .row-starlight { background-color: var(--item-starlight); color: #444; }
        .row-white { background-color: var(--item-white); color: #444; }

    </style>
</head>
<body>

<div id="app">
    <h2>専用資材</h2>
    <div id="list-materials"></div>

    <h2>付属品</h2>
    <div id="list-acc-standard"></div>

    <h2>付属品 (純正)</h2>
    <div id="list-acc-genuine"></div>
</div>

<script>
const itemsData = {
    materials: [
        { id: 'm1', name: 'ゆうパケットmini', stock: 0, cls: 'row-red' },
        { id: 'm2', name: 'ゆうパケット', stock: 0, cls: 'row-red' },
        { id: 'm3', name: '宅急便コンパクト', stock: 0, cls: 'row-yellow' }
    ],
    accStandard: [
        { id: 's1', name: '40/42 Black', stock: 0, cls: 'row-black' },
        { id: 's2', name: '40/42 Starlight', stock: 0, cls: 'row-starlight' },
        { id: 's3', name: '44/46 Black', stock: 0, cls: 'row-black' },
        { id: 's4', name: '44/46 Starlight', stock: 0, cls: 'row-starlight' },
        { id: 's5', name: '充電ケーブル', stock: 0, cls: 'row-white' }
    ],
    accGenuine: [
        { id: 'g1', name: '40/42 純正', stock: 0, cls: 'row-black' },
        { id: 'g2', name: '44/46 純正', stock: 0, cls: 'row-black' },
        { id: 'g3', name: '純正ケーブル', stock: 0, cls: 'row-white' }
    ]
};

let data = JSON.parse(localStorage.getItem('inventoryV3')) || itemsData;

// 1〜50のプルダウン用オプション作成
const optionsHTML = Array.from({length: 50}, (_, i) => `<option value="${i+1}">${i+1}</option>`).join('');

function save() {
    localStorage.setItem('inventoryV3', JSON.stringify(data));
    render();
}

function updateStock(section, id, amount) {
    const item = data[section].find(i => i.id === id);
    item.stock = Math.max(0, item.stock + amount);
    save();
}

function addSpecific(section, id) {
    const val = parseInt(document.getElementById(`sel-${id}`).value);
    updateStock(section, id, val);
}

function renderItem(item, section) {
    return `
        <div class="item-row ${item.cls}">
            <div class="name-area">
                <span class="name">${item.name}</span>
                <span class="stock-num">${item.stock}</span>
            </div>
            <div class="controls">
                <button class="btn-sq btn-out" onclick="updateStock('${section}', '${item.id}', -1)">出庫</button>
                <select id="sel-${item.id}">${optionsHTML}</select>
                <button class="btn-sq btn-in" onclick="addSpecific('${section}', '${item.id}')">入庫</button>
            </div>
        </div>
    `;
}

function render() {
    document.getElementById('list-materials').innerHTML = data.materials.map(i => renderItem(i, 'materials')).join('');
    document.getElementById('list-acc-standard').innerHTML = data.accStandard.map(i => renderItem(i, 'accStandard')).join('');
    document.getElementById('list-acc-genuine').innerHTML = data.accGenuine.map(i => renderItem(i, 'accGenuine')).join('');
}

render();
</script>

</body>
</html>
