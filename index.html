<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>在庫管理Pro V8</title>
    <style>
        :root {
            --bg-body: #f2f2f7;
            --btn-out: #ff9500; /* 出庫：オレンジ */
            --btn-in: #34c759;  /* 入庫：緑 */
            
            /* 背景カラー */
            --item-red: #d32f2f;      
            --item-yellow: #fbc02d;   
            --item-black: #1c1c1e;    
            --item-gold: #e3d1b0;     
            --item-white: #ffffff;    
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-body);
            margin: 0; padding: 10px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        h2 { font-size: 0.85rem; color: #6e6e73; margin: 18px 0 6px 8px; font-weight: 600; text-transform: uppercase; }

        .item-row {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            margin-bottom: 6px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
            gap: 8px;
            height: 54px;
        }

        /* 左側：残数と名称 */
        .info-area {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }
        
        .stock-badge {
            width: 36px;
            height: 36px;
            min-width: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 800;
            text-align: center;
        }

        .name {
            font-size: 0.85rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 右側：操作系（出庫・数選択・入庫） */
        .controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-action {
            width: 50px; height: 46px;
            border: none; border-radius: 8px;
            color: white; font-weight: 800; font-size: 0.75rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .btn-out { background-color: var(--btn-out); }
        .btn-in { background-color: var(--btn-in); }
        .btn-action:active { opacity: 0.6; transform: scale(0.95); }

        /* 回転式プルダウンを包むエリア */
        .select-wrapper {
            position: relative;
            width: 50px; height: 46px;
            background: white;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .select-wrapper select {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0; /* 見えないけどタップ可能 */
            z-index: 2;
        }

        .selected-val {
            font-size: 1.1rem;
            font-weight: 800;
            color: #333;
            z-index: 1;
        }

        /* 背景別スタイル */
        .row-red { background-color: var(--item-red); color: #fff; }
        .row-yellow { background-color: var(--item-yellow); color: #212121; }
        .row-black { background-color: var(--item-black); color: #fff; }
        .row-gold { background-color: var(--item-gold); color: #4a3f28; }
        .row-white { background-color: var(--item-white); color: #333; border: 1px solid #ddd; }
        
        /* バッジの微調整 */
        .row-white .stock-badge, .row-yellow .stock-badge, .row-gold .stock-badge { 
            background: rgba(0,0,0,0.05); 
        }

    </style>
</head>
<body>

<div id="app">
    <h2>専用資材</h2>
    <div id="list-materials"></div>

    <h2>付属品</h2>
    <div id="list-acc-standard"></div>

    <h2>付属品 (純正)</h2>
    <div id="list-acc-genuine"></div>
</div>

<script>
const itemsData = {
    materials: [
        { id: 'm1', name: 'ゆうパケットmini', stock: 0, cls: 'row-red' },
        { id: 'm2', name: 'ゆうパケット', stock: 0, cls: 'row-red' },
        { id: 'm3', name: '宅急便コンパクト', stock: 0, cls: 'row-yellow' }
    ],
    accStandard: [
        { id: 's1', name: '40/42 Black', stock: 0, cls: 'row-black' },
        { id: 's2', name: '40/42 Starlight', stock: 0, cls: 'row-gold' },
        { id: 's3', name: '44/46 Black', stock: 0, cls: 'row-black' },
        { id: 's4', name: '44/46 Starlight', stock: 0, cls: 'row-gold' },
        { id: 's5', name: '充電ケーブル', stock: 0, cls: 'row-white' }
    ],
    accGenuine: [
        { id: 'g1', name: '40/42 Band', stock: 0, cls: 'row-white' },
        { id: 'g2', name: '44/46 Band', stock: 0, cls: 'row-white' },
        { id: 'g3', name: '充電ケーブル', stock: 0, cls: 'row-white' }
    ]
};

let data = JSON.parse(localStorage.getItem('inventoryV8')) || itemsData;

// 1〜50のプルダウン（iPhone標準の回転式になる）
const optionsHTML = Array.from({length: 50}, (_, i) => `<option value="${i+1}">${i+1}</option>`).join('');

function save() {
    localStorage.setItem('inventoryV8', JSON.stringify(data));
    render();
}

function updateStock(section, id, amount) {
    const item = data[section].find(i => i.id === id);
    item.stock = Math.max(0, item.stock + amount);
    save();
}

// プルダウンの値が変更された時に表示を更新する
function syncVal(id) {
    const sel = document.getElementById(`sel-${id}`);
    const display = document.getElementById(`val-${id}`);
    display.innerText = sel.value;
}

function addSpecific(section, id) {
    const val = parseInt(document.getElementById(`sel-${id}`).value);
    updateStock(section, id, val);
}

function renderItem(item, section) {
    return `
        <div class="item-row ${item.cls}">
            <div class="info-area">
                <div class="stock-badge">${item.stock}</div>
                <span class="name">${item.name}</span>
            </div>
            <div class="controls">
                <button class="btn-action btn-out" onclick="updateStock('${section}', '${item.id}', -1)">出庫</button>
                <div class="select-wrapper">
                    <span class="selected-val" id="val-${item.id}">1</span>
                    <select id="sel-${item.id}" onchange="syncVal('${item.id}')">${optionsHTML}</select>
                </div>
                <button class="btn-action btn-in" onclick="addSpecific('${section}', '${item.id}')">入庫</button>
            </div>
        </div>
    `;
}

function render() {
    document.getElementById('list-materials').innerHTML = data.materials.map(i => renderItem(i, 'materials')).join('');
    document.getElementById('list-acc-standard').innerHTML = data.accStandard.map(i => renderItem(i, 'accStandard')).join('');
    document.getElementById('list-acc-genuine').innerHTML = data.accGenuine.map(i => renderItem(i, 'accGenuine')).join('');
}

render();
</script>

</body>
</html>
